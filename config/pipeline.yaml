# ─────────────────────────────────────────────────────────────────────
# SubCellSpace Pipeline Configuration
# Defines the pipeline step order and available backends.
# Each step can have multiple backend implementations.
# ─────────────────────────────────────────────────────────────────────

pipeline:
  name: "cosmx_minimal"
  description: "Minimal CosMx spatial transcriptomics analysis pipeline"
  version: "0.1.0"

  # Step execution order — each entry references a step name.
  # The pipeline runner will execute steps in this order.
  steps:
    - denoise
    - segmentation
    - spatial_domain          # ← cell-level spatial domain (before clustering)
    - subcellular_spatial_domain  # ← subcellular domain grouping
    - analysis                 # ← clustering & expression
    - annotation               # ← cell-type annotation
    - spatial_analysis         # ← multi-faceted spatial analysis (SVG, neighborhood, etc.)
    - subcellular_analysis     # ← RNA localization, co-localization network

  # Step definitions
  # Each step specifies its module and default backend.
  steps_config:
    denoise:
      module: "src.steps.denoise"
      default_backend: "intracellular"
      description: "Filter transcripts based on cell compartment"
      available_backends:
        - none: "Pass-through (no filtering)"
        - intracellular: "Keep Nuclear & Cytoplasm transcripts only"
        - nuclear_only: "Keep Nuclear transcripts only"
        - sparc: "Spatially-aware expression denoising (spARC)"

    segmentation:
      module: "src.steps.segmentation"
      default_backend: "provided_cells"
      description: "Assign transcripts to cells"
      available_backends:
        - provided_cells: "Use pre-existing cell ID column (fast, no segmentation)"
        - fov_cell_id: "Combine FOV + cell_ID into a cell label (fallback)"
        - cellpose: "Deep learning-based cell segmentation (Cellpose, requires image)"
        - baysor: "Probabilistic Bayesian spatial segmentation (requires Baysor CLI)"


    spatial_domain:
      module: "src.steps.spatial_domain"
      default_backend: "spatial_leiden"
      description: "Identify tissue-level spatial domains"
      available_backends:
        - spatial_leiden: "Leiden clustering on spatial neighbors graph"
        - spatial_kmeans: "KMeans clustering on spatial coordinates"
        - graphst: "Graph-guided Spatial Transformer (GraphST)"

    subcellular_spatial_domain:
      module: "src.steps.subcellular_spatial_domain"
      default_backend: "hdbscan"
      description: "Identify subcellular spatial domains within each cell"
      available_backends:
        - hdbscan: "Density-based HDBSCAN clustering"
        - dbscan: "Density-based DBSCAN clustering"
        - leiden_spatial: "Spatial k-NN graph + Leiden clustering"
        - phenograph: "Graph-based PhenoGraph clustering"
        - none: "Skip subcellular clustering"

    analysis:
      module: "src.steps.analysis"
      default_backend: "leiden"
      description: "Clustering & expression analysis"
      available_backends:
        - leiden: "Leiden clustering on PCA embedding"
        - kmeans: "KMeans clustering on PCA embedding"
        - scvi: "Single-cell Variational Inference (scVI) for latent representation + Leiden"

    annotation:
      module: "src.steps.annotation"
      default_backend: "rank_marker"
      description: "Cell-type annotation"
      available_backends:
        - cluster_label: "Map cluster IDs to cell type labels"
        - rank_marker: "Annotate based on top differentially expressed genes"
        - celltypist: "Automated cell-type annotation using CellTypist reference models"

    spatial_analysis:
      module: "src.steps.spatial_analysis"
      default_backend: "squidpy"
      description: "Multi-faceted spatial analysis"
      available_backends:
        - squidpy: "Spatially variable genes, neighbourhood enrichment, cell co-occurrence"
        - scfates: "Tree inference and pseudotime trajectory analysis"

    subcellular_analysis:
      module: "src.steps.subcellular_analysis"
      default_backend: "rna_localization"
      description: "Subcellular RNA analysis"
      available_backends:
        - rna_localization: "RNA radial distance and localization metrics"
        - scrin_stub: "SCRIN co-localization network stub"
