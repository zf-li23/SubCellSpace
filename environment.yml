# environment.yml
# SubCellSpace Conda 环境定义
#
# 这个文件只做一件事：创建一个只带 Python 的空 conda 环境。
# 所有 Python 包的安装全部委托给 pyproject.toml 的 pip install -e .[extras]
#
# 使用方式：
#   conda env create -f environment.yml
#   conda activate subcellspace
#   pip install -e ".[hdbscan,dev]"        # Step 1: 核心依赖
#   pip install -e ".[all]"                # Step 3: 全部可选后端

name: subcellspace
channels:
  - conda-forge
dependencies:
  - python>=3.11,<3.13
  - pip
